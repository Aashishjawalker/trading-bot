<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trading Bot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
  color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center
}
.container{text-align:center;max-width:600px;padding:40px 20px}
h1{font-size:2rem;margin-bottom:8px;font-weight:700}
.subtitle{color:#94a3b8;margin-bottom:40px;font-size:1rem}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{
  background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px 28px;
  width:240px;cursor:pointer;transition:all .2s;text-decoration:none;color:#e2e8f0
}
.card:hover{border-color:#3b82f6;transform:translateY(-4px);box-shadow:0 8px 24px rgba(59,130,246,.15)}
.icon{font-size:3rem;margin-bottom:16px}
.card h2{font-size:1.2rem;margin-bottom:8px}
.card p{color:#94a3b8;font-size:.85rem;line-height:1.5}
.footer{margin-top:40px;color:#475569;font-size:.8rem}
</style>
</head>
<body>
<div class="container">
  <h1>Binance Futures Bot</h1>
  <p class="subtitle">Choose how to interact with the trading bot</p>
  <div class="cards">
    <a class="card" href="/ui/">
      <div class="icon">🖥️</div>
      <h2>Web UI Dashboard</h2>
      <p>Full trading dashboard with positions, orders, and trade form</p>
    </a>
    <a class="card" href="/terminal">
      <div class="icon">⌨️</div>
      <h2>Terminal Access</h2>
      <p>Interactive CLI — place orders, check positions, manage your bot</p>
    </a>
  </div>
  <div class="footer">Hugging Face Spaces</div>
</div>
</body>
</html>
